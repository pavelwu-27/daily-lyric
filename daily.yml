name: Generate Daily Lyric

  on:
    schedule:
      - cron: '0 1 * * *'
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    generate:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - run: pip install requests

        - run: python generate.py

        - uses: stefanzweifel/git-auto-commit-action@v5
          with:
            commit_message: "chore: update daily lyric"
