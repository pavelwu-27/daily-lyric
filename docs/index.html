<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日歌词</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Serif SC', serif;
  transition: background 1.2s ease;
  overflow: hidden;
}

body.miss     { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
body.freedom  { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
body.gentle   { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
body.passion  { background: linear-gradient(135deg, #f5576c 0%, #ff9a76 100%); }
body.lonely   { background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%); }
body.romantic { background: linear-gradient(135deg, #f78ca0 0%, #fe9a8b 100%); }
body.farewell { background: linear-gradient(135deg, #c471f5 0%, #fa71cd 100%); }
body.youth    { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
body.healing  { background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); }
body.jianghu  { background: linear-gradient(135deg, #485563 0%, #29323c 100%); }
body.hometown { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
body.dream    { background: linear-gradient(135deg, #a18cd1 0%, #5ee7df 100%); }
body.ocean    { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
body.rain     { background: linear-gradient(135deg, #616161 0%, #9bc5c3 100%); }
body.wind     { background: linear-gradient(135deg, #c3cfe2 0%, #f5f7fa 100%); }
body.flower   { background: linear-gradient(135deg, #fddb92 0%, #d1fdff 100%); }
body.night    { background: linear-gradient(135deg, #0c3483 0%, #a2b6df 100%); }
body.time     { background: linear-gradient(135deg, #d4d3dd 0%, #efefbb 100%); }
body.default  { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }

.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.3;
  pointer-events: none;
  animation: float 8s ease-in-out infinite;
}
.orb-1 { width: 400px; height: 400px; top: -100px; left: -100px; background: rgba(255,255,255,0.4); }
.orb-2 { width: 300px; height: 300px; bottom: -80px; right: -80px; background: rgba(255,255,255,0.3); animation-delay: -4s; }

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-30px); }
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 24px;
  padding: 48px 56px;
  max-width: 520px;
  width: 90%;
  text-align: center;
  color: #fff;
  position: relative;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.meta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 14px;
  opacity: 0.85;
  margin-bottom: 36px;
  letter-spacing: 1px;
}

.meta .divider {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
}

.meta .theme-tag {
  padding: 2px 12px;
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 12px;
  font-size: 12px;
  letter-spacing: 2px;
}

.lyric {
  font-size: 22px;
  line-height: 2;
  margin-bottom: 36px;
  min-height: 120px;
  font-weight: 400;
  letter-spacing: 2px;
}

.lyric .line {
  opacity: 0;
  animation: lineIn 0.6s ease forwards;
}

@keyframes lineIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.song-info {
  border-top: 1px solid rgba(255,255,255,0.2);
  padding-top: 24px;
}

.song-name {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
}

.artist {
  font-size: 13px;
  opacity: 0.7;
}

.nav {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 28px;
}

.nav-btn {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  padding: 8px 24px;
  border-radius: 20px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  transition: all 0.3s;
  letter-spacing: 1px;
}

.nav-btn:hover {
  background: rgba(255,255,255,0.35);
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: default;
}

.loading {
  font-size: 16px;
  opacity: 0.7;
  letter-spacing: 2px;
}

.loading::after {
  content: '';
  animation: dots 1.5s steps(4, end) infinite;
}

@keyframes dots {
  0%  { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}
</style>
</head>
<body class="default">
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card" id="card">
  <div class="loading">正在为你挑选今日歌词</div>
</div>

<script>
let lyrics = [];
let currentIndex = 0;

async function loadData() {
  const card = document.getElementById('card');
  try {
    const res = await fetch('data.json');
    const data = await res.json();
    lyrics = data.lyrics || [];
    if (lyrics.length === 0) {
      card.innerHTML = '<div style="opacity:0.8">今日歌词还未生成，请稍后再来</div>';
      return;
    }
    renderLyric(0);
  } catch (e) {
    card.innerHTML = '<div style="opacity:0.8">加载失败，请稍后再试</div>';
  }
}

function renderLyric(index) {
  const data = lyrics[index];
  if (!data) return;
  currentIndex = index;

  document.body.className = data.theme_bg || 'default';

  const lyricHtml = data.lyric.map((line, i) =>
    `<div class="line" style="animation-delay:${0.3 + i * 0.2}s">${line}</div>`
  ).join('');

  const card = document.getElementById('card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  card.innerHTML = `
    <div class="meta">
      <span>${lyrics._date || ''}</span>
      <div class="divider"></div>
      <span class="theme-tag">${data.theme}</span>
    </div>
    <div class="lyric">${lyricHtml}</div>
    <div class="song-info">
      <div class="song-name">「${data.song}」</div>
      <div class="artist">${data.artist}</div>
    </div>
    <div class="nav">
      <button class="nav-btn" onclick="renderLyric(currentIndex-1)" ${index === 0 ? 'disabled' : ''}>上一首</button>
      <button class="nav-btn" onclick="downloadCard()">保存卡片</button>
      <button class="nav-btn" onclick="renderLyric(currentIndex+1)" ${index >= lyrics.length - 1 ? 'disabled' : ''}>下一首</button>
    </div>
  `;
}

async function init() {
  const card = document.getElementById('card');
  try {
    const res = await fetch('data.json');
    const data = await res.json();
    lyrics = data.lyrics || [];
    lyrics._date = data.date;
    if (lyrics.length === 0) {
      card.innerHTML = '<div style="opacity:0.8">今日歌词还未生成，请稍后再来</div>';
      return;
    }
    renderLyric(0);
  } catch (e) {
    card.innerHTML = '<div style="opacity:0.8">加载失败，请稍后再试</div>';
  }
}

function downloadCard() {
  const data = lyrics[currentIndex];
  if (!data) return;

  const W = 1080, H = 1440;
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // 背景渐变
  const bgMap = {
    miss:     ['#a18cd1','#fbc2eb'], freedom:  ['#43e97b','#38f9d7'],
    gentle:   ['#fbc2eb','#a6c1ee'], passion:  ['#f5576c','#ff9a76'],
    lonely:   ['#4b6cb7','#182848'], romantic: ['#f78ca0','#fe9a8b'],
    farewell: ['#c471f5','#fa71cd'], youth:    ['#f6d365','#fda085'],
    healing:  ['#89f7fe','#66a6ff'], jianghu:  ['#485563','#29323c'],
    hometown: ['#ffecd2','#fcb69f'], dream:    ['#a18cd1','#5ee7df'],
    ocean:    ['#667eea','#764ba2'], rain:     ['#616161','#9bc5c3'],
    wind:     ['#c3cfe2','#f5f7fa'], flower:   ['#fddb92','#d1fdff'],
    night:    ['#0c3483','#a2b6df'], time:     ['#d4d3dd','#efefbb'],
  };
  const colors = bgMap[data.theme_bg] || ['#f6d365','#fda085'];
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, colors[0]);
  grad.addColorStop(1, colors[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 装饰圆
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(160, 200, 200, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W-120, H-160, 160, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // 卡片背景
  const cx = 80, cy = 160, cw = W-160, ch = H-320, cr = 40;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.moveTo(cx+cr, cy);
  ctx.lineTo(cx+cw-cr, cy); ctx.quadraticCurveTo(cx+cw, cy, cx+cw, cy+cr);
  ctx.lineTo(cx+cw, cy+ch-cr); ctx.quadraticCurveTo(cx+cw, cy+ch, cx+cw-cr, cy+ch);
  ctx.lineTo(cx+cr, cy+ch); ctx.quadraticCurveTo(cx, cy+ch, cx, cy+ch-cr);
  ctx.lineTo(cx, cy+cr); ctx.quadraticCurveTo(cx, cy, cx+cr, cy);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 日期 + 主题
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = '28px "Noto Serif SC", serif';
  ctx.textAlign = 'center';
  const metaText = lyrics._date ? `${lyrics._date}    ${data.theme}` : data.theme;
  ctx.fillText(metaText, W/2, cy + 80);

  // 歌词
  ctx.fillStyle = '#fff';
  ctx.font = '38px "Noto Serif SC", serif';
  const lyricY = cy + 180;
  const lineH = 80;
  data.lyric.forEach((line, i) => {
    ctx.fillText(line, W/2, lyricY + i * lineH);
  });

  // 分割线
  const sepY = lyricY + data.lyric.length * lineH + 40;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W/2 - 160, sepY);
  ctx.lineTo(W/2 + 160, sepY);
  ctx.stroke();

  // 歌曲信息
  ctx.fillStyle = '#fff';
  ctx.font = '600 32px "Noto Serif SC", serif';
  ctx.fillText(`「${data.song}」`, W/2, sepY + 60);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '26px "Noto Serif SC", serif';
  ctx.fillText(data.artist, W/2, sepY + 105);

  // 导出
  const link = document.createElement('a');
  link.download = `歌词-${data.song}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

init();
</script>
</body>
</html>
