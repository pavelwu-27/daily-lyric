<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日歌词</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Serif SC', serif;
  transition: background 1.2s ease;
  overflow-x: hidden;
}

body.miss     { background: linear-gradient(160deg, #7c3aed 0%, #db2777 100%); }
body.freedom  { background: linear-gradient(160deg, #059669 0%, #0d9488 100%); }
body.gentle   { background: linear-gradient(160deg, #a855f7 0%, #6366f1 100%); }
body.passion  { background: linear-gradient(160deg, #dc2626 0%, #ea580c 100%); }
body.lonely   { background: linear-gradient(160deg, #3730a3 0%, #1e1b4b 100%); }
body.romantic { background: linear-gradient(160deg, #e11d48 0%, #be185d 100%); }
body.farewell { background: linear-gradient(160deg, #9333ea 0%, #c026d3 100%); }
body.youth    { background: linear-gradient(160deg, #d97706 0%, #ea580c 100%); }
body.healing  { background: linear-gradient(160deg, #2563eb 0%, #7c3aed 100%); }
body.jianghu  { background: linear-gradient(160deg, #44403c 0%, #1c1917 100%); }
body.hometown { background: linear-gradient(160deg, #c2410c 0%, #b45309 100%); }
body.dream    { background: linear-gradient(160deg, #7c3aed 0%, #06b6d4 100%); }
body.ocean    { background: linear-gradient(160deg, #4f46e5 0%, #7e22ce 100%); }
body.rain     { background: linear-gradient(160deg, #475569 0%, #0f766e 100%); }
body.wind     { background: linear-gradient(160deg, #6366f1 0%, #3b82f6 100%); }
body.flower   { background: linear-gradient(160deg, #be185d 0%, #9333ea 100%); }
body.night    { background: linear-gradient(160deg, #1e3a5f 0%, #312e81 100%); }
body.time     { background: linear-gradient(160deg, #6d28d9 0%, #4338ca 100%); }
body.rnb      { background: linear-gradient(160deg, #6d28d9 0%, #dc2626 100%); }
body.canto    { background: linear-gradient(160deg, #be185d 0%, #9333ea 100%); }
body.cantonese { background: linear-gradient(160deg, #b91c1c 0%, #a16207 100%); }
body.default  { background: linear-gradient(160deg, #d97706 0%, #ea580c 100%); }

/* 装饰层 */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.25;
  pointer-events: none;
  animation: float 10s ease-in-out infinite;
}
.orb-1 { width: 500px; height: 500px; top: -150px; left: -120px; background: rgba(255,255,255,0.5); }
.orb-2 { width: 400px; height: 400px; bottom: -100px; right: -100px; background: rgba(255,255,255,0.4); animation-delay: -5s; }
.orb-3 { width: 200px; height: 200px; top: 50%; right: 10%; background: rgba(255,255,255,0.2); animation-delay: -3s; }

@keyframes float {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-25px) scale(1.03); }
}

/* 粒子装饰 */
.particles {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 4px; height: 4px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  animation: drift linear infinite;
}
@keyframes drift {
  from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  to { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}

/* 卡片 */
.card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 28px;
  padding: 56px 64px 48px;
  max-width: 560px;
  width: 92%;
  text-align: center;
  color: #fff;
  position: relative;
  z-index: 1;
  animation: cardIn 1s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.2);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* 顶部装饰线 */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 60px; height: 3px;
  border-radius: 2px;
  background: rgba(255,255,255,0.5);
}

/* 日期+主题 */
.meta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  font-size: 13px;
  opacity: 0.8;
  margin-bottom: 44px;
  letter-spacing: 1.5px;
  font-weight: 300;
}

.meta .dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
}

.meta .theme-tag {
  padding: 3px 14px;
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 14px;
  font-size: 12px;
  letter-spacing: 3px;
  font-weight: 400;
}

/* 歌词引号装饰 */
.quote-mark {
  font-size: 48px;
  line-height: 1;
  opacity: 0.2;
  font-weight: 700;
  margin-bottom: -8px;
  user-select: none;
}

/* 歌词 */
.lyric {
  font-size: 24px;
  line-height: 2.2;
  margin-bottom: 40px;
  min-height: 140px;
  font-weight: 400;
  letter-spacing: 3px;
}

.lyric .line {
  opacity: 0;
  animation: lineIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes lineIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 歌曲信息 */
.song-info {
  border-top: 1px solid rgba(255,255,255,0.15);
  padding-top: 28px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.song-name {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 1px;
}

.artist {
  font-size: 14px;
  opacity: 0.6;
  font-weight: 300;
  letter-spacing: 1px;
}

/* 底部操作栏 */
.actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 32px;
}

.btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  padding: 10px 28px;
  border-radius: 24px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  transition: all 0.3s;
  letter-spacing: 1.5px;
  font-weight: 400;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn:hover {
  background: rgba(255,255,255,0.3);
  transform: translateY(-1px);
}

.btn:disabled {
  opacity: 0.25;
  cursor: default;
  transform: none;
}

.btn.primary {
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.35);
}

/* 页码指示器 */
.indicator {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
}

.dot-indicator {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  transition: all 0.3s;
  cursor: pointer;
}

.dot-indicator.active {
  background: rgba(255,255,255,0.8);
  width: 20px;
  border-radius: 3px;
}

/* 底部版权 */
.footer {
  position: fixed;
  bottom: 20px;
  left: 0; right: 0;
  text-align: center;
  color: rgba(255,255,255,0.3);
  font-size: 11px;
  letter-spacing: 1px;
  font-weight: 300;
  z-index: 0;
}

/* loading */
.loading {
  font-size: 16px;
  opacity: 0.7;
  letter-spacing: 2px;
  font-weight: 300;
  padding: 60px 0;
}

.loading::after {
  content: '';
  animation: dots 1.5s steps(4, end) infinite;
}

@keyframes dots {
  0%  { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}

@media (max-width: 600px) {
  body { align-items: flex-start; padding: 24px 0; }
  .card { padding: 36px 24px 28px; border-radius: 20px; max-width: 100%; width: 94%; }
  .meta { margin-bottom: 28px; gap: 10px; font-size: 12px; }
  .meta .theme-tag { font-size: 11px; padding: 2px 10px; letter-spacing: 2px; }
  .quote-mark { font-size: 32px; margin-bottom: -4px; }
  .lyric { font-size: 18px; line-height: 2; letter-spacing: 1.5px; margin-bottom: 28px; min-height: 100px; }
  .song-info { padding-top: 20px; }
  .song-name { font-size: 15px; }
  .artist { font-size: 12px; }

  /* 按钮改为竖排 */
  .actions {
    flex-direction: column;
    gap: 10px;
    margin-top: 24px;
  }
  .btn {
    width: 100%;
    justify-content: center;
    padding: 10px 0;
    font-size: 13px;
    letter-spacing: 2px;
  }

  .indicator { margin-top: 16px; gap: 6px; }
  .dot-indicator { width: 5px; height: 5px; }
  .dot-indicator.active { width: 16px; }

  .footer { font-size: 10px; bottom: 12px; }
  .orb-1 { width: 250px; height: 250px; }
  .orb-2 { width: 200px; height: 200px; }
  .orb-3 { display: none; }
}
</style>
</head>
<body class="default">
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="particles" id="particles"></div>

<div class="card" id="card">
  <div class="loading">正在为你挑选今日歌词</div>
</div>

<div class="footer">每日歌词 · 每天一首，与你相伴</div>

<script>
let lyrics = [];
let currentIndex = 0;
let apiOffset = 0;  // API 刷新偏移
// 替换为你部署的 Worker 地址
const API_URL = 'https://daily-lyric.vercel.app/api/lyric';

// 粒子
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = (-Math.random() * 15) + 's';
    container.appendChild(p);
  }
}
createParticles();

function renderLyric(index) {
  const data = lyrics[index];
  if (!data) return;
  currentIndex = index;
  document.body.className = data.theme_bg || 'default';

  const lyricHtml = data.lyric.map((line, i) =>
    `<div class="line" style="animation-delay:${0.15 + i * 0.12}s">${line}</div>`
  ).join('');

  const dotsHtml = lyrics.slice(0, 50).map((_, i) =>
    `<div class="dot-indicator${i === index ? ' active' : ''}" onclick="renderLyric(${i})"></div>`
  ).join('');

  // 如果歌词超过本地池，显示更多指示
  const moreDots = lyrics.length > 50 ? '<div class="dot-indicator" style="opacity:0.15">+</div>' : '';

  const card = document.getElementById('card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  card.innerHTML = `
    <div class="meta">
      <span>${lyrics._date || ''}</span>
      <div class="dot"></div>
      <span class="theme-tag">${data.theme}</span>
    </div>
    <div class="quote-mark">"</div>
    <div class="lyric">${lyricHtml}</div>
    <div class="song-info">
      <div class="song-name">「${data.song}」</div>
      <div class="artist">${data.artist}</div>
    </div>
    <div class="actions">
      <button class="btn" onclick="renderLyric(currentIndex-1)" ${index === 0 ? 'disabled' : ''}>&larr; 上一首</button>
      <button class="btn primary" onclick="downloadCard()">保存卡片</button>
      <button class="btn" onclick="fetchNext()">换一首 &rarr;</button>
    </div>
    <div class="indicator">${dotsHtml}${moreDots}</div>
  `;
}

// 从 API 获取下一首
async function fetchNext() {
  const card = document.getElementById('card');
  card.innerHTML = '<div class="loading">正在挑选新的歌词</div>';
  document.body.className = 'default';

  try {
    const res = await fetch(`${API_URL}?offset=${apiOffset}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    apiOffset++;
    lyrics.push(data);
    renderLyric(lyrics.length - 1);
  } catch (e) {
    // API 失败，从本地池随机挑一首
    if (lyrics.length > 1) {
      let next;
      do { next = Math.floor(Math.random() * lyrics.length); } while (next === currentIndex && lyrics.length > 1);
      renderLyric(next);
    } else {
      card.innerHTML = '<div style="opacity:0.8">获取失败，请稍后再试</div>';
    }
  }
}

function downloadCard() {
  const data = lyrics[currentIndex];
  if (!data) return;

  const W = 1080, H = 1440;
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  const bgMap = {
    miss:     ['#7c3aed','#db2777'], freedom:  ['#059669','#0d9488'],
    gentle:   ['#a855f7','#6366f1'], passion:  ['#dc2626','#ea580c'],
    lonely:   ['#3730a3','#1e1b4b'], romantic: ['#e11d48','#be185d'],
    farewell: ['#9333ea','#c026d3'], youth:    ['#d97706','#ea580c'],
    healing:  ['#2563eb','#7c3aed'], jianghu:  ['#44403c','#1c1917'],
    hometown: ['#c2410c','#b45309'], dream:    ['#7c3aed','#06b6d4'],
    ocean:    ['#4f46e5','#7e22ce'], rain:     ['#475569','#0f766e'],
    wind:     ['#6366f1','#3b82f6'], flower:   ['#be185d','#9333ea'],
    night:    ['#1e3a5f','#312e81'], time:     ['#6d28d9','#4338ca'],
    rnb:      ['#6d28d9','#dc2626'], canto:    ['#be185d','#9333ea'],
    cantonese:['#b91c1c','#a16207'],
  };
  const colors = bgMap[data.theme_bg] || ['#f6d365','#fda085'];
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, colors[0]);
  grad.addColorStop(1, colors[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 装饰圆
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(160, 200, 240, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W-120, H-160, 200, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W*0.6, H*0.15, 100, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // 卡片背景
  const cx = 80, cy = 180, cw = W-160, ch = H-360, cr = 40;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.moveTo(cx+cr, cy);
  ctx.lineTo(cx+cw-cr, cy); ctx.quadraticCurveTo(cx+cw, cy, cx+cw, cy+cr);
  ctx.lineTo(cx+cw, cy+ch-cr); ctx.quadraticCurveTo(cx+cw, cy+ch, cx+cw-cr, cy+ch);
  ctx.lineTo(cx+cr, cy+ch); ctx.quadraticCurveTo(cx, cy+ch, cx, cy+ch-cr);
  ctx.lineTo(cx, cy+cr); ctx.quadraticCurveTo(cx, cy, cx+cr, cy);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 顶部装饰线
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillRect(W/2 - 30, cy + 30, 60, 3);

  // 日期 + 主题
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = '26px "Noto Serif SC", serif';
  ctx.textAlign = 'center';
  const metaText = lyrics._date ? `${lyrics._date}  ·  ${data.theme}` : data.theme;
  ctx.fillText(metaText, W/2, cy + 80);

  // 引号装饰
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = 'bold 100px "Noto Serif SC", serif';
  ctx.fillText('“', W/2, cy + 200);

  // 歌词
  ctx.fillStyle = '#fff';
  ctx.font = '40px "Noto Serif SC", serif';
  const lyricY = cy + 260;
  const lineH = 90;
  data.lyric.forEach((line, i) => {
    ctx.fillText(line, W/2, lyricY + i * lineH);
  });

  // 分割线
  const sepY = lyricY + data.lyric.length * lineH + 50;
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W/2 - 180, sepY);
  ctx.lineTo(W/2 + 180, sepY);
  ctx.stroke();

  // 歌曲信息
  ctx.fillStyle = '#fff';
  ctx.font = '600 34px "Noto Serif SC", serif';
  ctx.fillText(`「${data.song}」`, W/2, sepY + 65);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '28px "Noto Serif SC", serif';
  ctx.fillText(data.artist, W/2, sepY + 115);

  // 底部
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '20px "Noto Serif SC", serif';
  ctx.fillText('每日歌词', W/2, H - 50);

  const link = document.createElement('a');
  link.download = `歌词-${data.song}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

async function init() {
  const card = document.getElementById('card');
  try {
    const res = await fetch('data.json');
    const data = await res.json();
    lyrics = data.lyrics || [];
    lyrics._date = data.date;
    if (lyrics.length === 0) {
      card.innerHTML = '<div style="opacity:0.8">今日歌词还未生成，请稍后再来</div>';
      return;
    }
    renderLyric(0);
  } catch (e) {
    card.innerHTML = '<div style="opacity:0.8">加载失败，请稍后再试</div>';
  }
}

init();
</script>
</body>
</html>
